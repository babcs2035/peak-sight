name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      # Convert github.repository_owner to lowercase to avoid Docker naming issues
      - name: Lowercase Repository Owner
        run: |
          echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.deploy
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/peak-sight:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_FULL_URL=${{ secrets.NEXT_PUBLIC_FULL_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_BASE_PATH=${{ secrets.NEXT_PUBLIC_BASE_PATH }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
            BACKEND_PORT=${{ secrets.API_PORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Image to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Need lowercase repo owner for pulling
      - name: Lowercase Repository Owner
        run: |
          echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Pull & Run Image on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e

            IMAGE="ghcr.io/${{ env.REPO_OWNER }}/peak-sight:latest"

            # Login to registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the completely built image
            docker pull $IMAGE
            
            # Stop existing containers if they exist
            docker stop peak-sight || true
            docker rm peak-sight || true
            docker stop peak-sight-redis-exporter || true
            docker rm peak-sight-redis-exporter || true

            # Create network for interconnection
            docker network create peak-sight-net || true

            # Set configuration parameters from GitHub Secrets
            FRONTEND_PORT_SECRET="${{ secrets.FRONTEND_PORT }}"
            API_PORT_SECRET="${{ secrets.API_PORT }}"
            
            export FRONTEND_PORT=${FRONTEND_PORT_SECRET:-3400}
            export API_PORT=${API_PORT_SECRET:-8200}
            export API_BASE_PATH="${{ secrets.API_BASE_PATH }}"

            # Run peak-sight container (Bind only to localhost to close external exposure)
            docker run -d --name peak-sight \
              --restart unless-stopped \
              --network peak-sight-net \
              --env-file .env \
              -e PORT=${FRONTEND_PORT} \
              -e API_PORT=${API_PORT} \
              -e API_BASE_PATH="${API_BASE_PATH}" \
              -p 127.0.0.1:${FRONTEND_PORT}:${FRONTEND_PORT} \
              -p 127.0.0.1:${API_PORT}:${API_PORT} \
              $IMAGE

            # Run Bitnami Redis Exporter (Bind only to localhost)
            docker run -d --name peak-sight-redis-exporter \
              --restart unless-stopped \
              --network peak-sight-net \
              -p 127.0.0.1:9121:9121 \
              -e REDIS_ADDR=redis://peak-sight:6379 \
              bitnami/redis-exporter:latest

            docker logout ghcr.io
            echo "Deployment to VPS completed successfully!"
